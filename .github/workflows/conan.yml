name: Conan CI

on:
  push:
    branches: [main]
    paths:
      - "**.cpp"
      - "**.hpp"
      - "**.hxx"
      - "meson.build"
      - "meson_options.txt"
      - "**/meson.build"
      - "conanfile.py"
      - ".github/workflows/conan.yml"
  pull_request:
    paths:
      - "**.cpp"
      - "**.hpp"
      - "**.hxx"
      - "meson.build"
      - "meson_options.txt"
      - "**/meson.build"
      - "conanfile.py"
      - ".github/workflows/conan.yml"

jobs:
  build:
    name: ${{ matrix.platform.name }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.platform.image }}
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        platform:
          - name: Linux (GCC 15)
            image: ubuntu-24.04
            cc: gcc-15
            cxx: g++-15
          - name: macOS (Clang)
            image: macos-latest
            cc: clang
            cxx: clang++
          - name: Windows (MSVC)
            image: windows-latest
            cc: cl
            cxx: cl
    env:
      MESON_VERSION: "1.7.2"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # -- Toolchain --
      - name: Install GCC 15 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15 ccache
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 100

      - name: Install ccache (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: python -m pip install meson==${{ env.MESON_VERSION }} ninja conan

      - name: Install pkg-config (Windows)
        if: runner.os == 'Windows'
        run: choco install pkgconfiglite

      # -- Conan --
      - name: Create conan profile (Unix)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.platform.cc }}
          CXX: ${{ matrix.platform.cxx }}
        run: conan profile detect

      - name: Create conan profile (Windows)
        if: runner.os == 'Windows'
        run: conan profile detect

      - name: Update conan profile
        shell: bash
        run: |
          PROFILE_PATH=$(conan profile path default)
          echo "compiler.cppstd=26" >> "$PROFILE_PATH"
          echo "build_type=${{ matrix.build_type }}" >> "$PROFILE_PATH"
          conan profile show

      - name: Install conan dependencies
        run: conan install . --output-folder=builddir/conan --build=missing

      # -- Caches --
      - name: Cache ccache
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.platform.image }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.platform.image }}-${{ matrix.build_type }}-

      - name: Configure ccache
        if: runner.os != 'Windows'
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      # -- Build & Test --
      - name: Configure
        env:
          CC: ${{ runner.os != 'Windows' && format('ccache {0}', matrix.platform.cc) || matrix.platform.cc }}
          CXX: ${{ runner.os != 'Windows' && format('ccache {0}', matrix.platform.cxx) || matrix.platform.cxx }}
        run: meson setup builddir/ --native-file builddir/conan/conan_meson_native.ini

      - name: Build
        run: meson compile -C builddir/

      - name: ccache stats
        if: runner.os != 'Windows'
        run: ccache -s

      - name: Test
        run: meson test -C builddir/ -v

      - name: Upload test log
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ matrix.platform.name }}-${{ matrix.build_type }}-testlog
          path: builddir/meson-logs/testlog.txt
